<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quant-Alpha Terminal v2.1</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Consolas', monospace; background: #080808; color: #eee; margin: 0; padding: 20px; }
        .dashboard { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; max-width: 1400px; margin: auto; }
        .box { background: #121212; border: 1px solid #333; padding: 20px; border-radius: 8px; }
        .header { grid-column: span 2; display: flex; justify-content: space-between; border-bottom: 2px solid #ffeb3b; padding-bottom: 10px; margin-bottom: 20px; }
        #regime-status { font-size: 24px; font-weight: bold; }
        .label { color: #666; font-size: 11px; text-transform: uppercase; margin-bottom: 15px; }
        .bias-wrapper { height: 14px; width: 100%; background: #222; border-radius: 7px; display: flex; overflow: hidden; border: 1px solid #444; }
        #pos-bar { background: #00e676; width: 50%; transition: width 0.8s ease; }
        #neg-bar { background: #ff5252; width: 50%; transition: width 0.8s ease; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <div><span style="color: #ffeb3b; font-weight: bold;">SENTIMENT TERMINAL</span> <span style="font-size: 12px; color: #555;">v2.1</span></div>
        <div id="regime-status">SYNCING...</div>
    </div>

    <div class="box">
        <div class="label">Regime Analysis: SMA (Trend) vs Raw Velocity (Noise)</div>
        <canvas id="mainChart"></canvas>
    </div>

    <div class="box">
        <div class="label">Conviction Cluster</div>
        <canvas id="convictionChart"></canvas>
    </div>

    <div class="box" style="grid-column: span 2;">
        <div class="label">Global Sentiment Tug-of-War (Direct Model Bias)</div>
        <div class="bias-wrapper"><div id="pos-bar"></div><div id="neg-bar"></div></div>
    </div>
</div>

<script>
    const regimeTxt = document.getElementById('regime-status');
    const posBar = document.getElementById('pos-bar');
    const negBar = document.getElementById('neg-bar');
    let vHistory = [];

    const mainCtx = document.getElementById('mainChart').getContext('2d');
    let mainChart = new Chart(mainCtx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [
                { 
                    label: 'Sentiment SMA (5)', data: [], borderColor: '#ffeb3b', 
                    borderWidth: 4, pointRadius: 0, tension: 0.4, z: 10 
                },
                { 
                    label: 'Raw Velocity', data: [], borderColor: 'rgba(0, 229, 255, 0.3)', 
                    borderWidth: 1, pointRadius: 3, showLine: true 
                },
                {
                    label: 'Bullish Threshold', data: [], borderColor: 'rgba(0, 230, 118, 0.2)',
                    borderDash: [10, 5], borderWidth: 1, pointRadius: 0, fill: false
                },
                {
                    label: 'Bearish Threshold', data: [], borderColor: 'rgba(255, 82, 82, 0.2)',
                    borderDash: [10, 5], borderWidth: 1, pointRadius: 0, fill: false
                }
            ]
        },
        options: {
            scales: {
                y: { min: -0.12, max: 0.12, grid: { color: '#222' }, ticks: { color: '#555' } }
            },
            plugins: { legend: { labels: { color: '#888' } } }
        }
    });

    const convCtx = document.getElementById('convictionChart').getContext('2d');
    let convChart = new Chart(convCtx, {
        type: 'scatter',
        data: { datasets: [{ label: 'Signals', data: [], backgroundColor: '#ff5722', pointRadius: 5 }] },
        options: { scales: { x: { min: -0.15, max: 0.15 }, y: { min: 0.4, max: 1 } } }
    });

    const socket = new WebSocket('ws://127.0.0.1:8000/ws/v_t_stream');
    socket.onmessage = (event) => {
        const d = JSON.parse(event.data);
        const time = new Date().toLocaleTimeString();

        // 1. Tug of War
        const totalBias = d.pos + d.neg;
        posBar.style.width = (d.pos / totalBias * 100) + "%";
        negBar.style.width = (d.neg / totalBias * 100) + "%";

        // 2. Smoothing
        vHistory.push(d.velocity);
        if(vHistory.length > 5) vHistory.shift();
        const sma = vHistory.reduce((a,b) => a+b, 0) / vHistory.length;

        // 3. Threshold Lines
        const upperLimit = 0.04;
        const lowerLimit = -0.04;

        // 4. Update Main Chart
        mainChart.data.labels.push(time);
        mainChart.data.datasets[0].data.push(sma);
        mainChart.data.datasets[1].data.push(d.velocity);
        mainChart.data.datasets[2].data.push(upperLimit); // Bull Line
        mainChart.data.datasets[3].data.push(lowerLimit); // Bear Line
        
        if(mainChart.data.labels.length > 25) {
            mainChart.data.labels.shift();
            mainChart.data.datasets.forEach(s => s.data.shift());
        }
        mainChart.update('none');

        // 5. Conviction Cluster
        convChart.data.datasets[0].data.push({x: d.velocity, y: d.confidence});
        if(convChart.data.datasets[0].data.length > 15) convChart.data.datasets[0].data.shift();
        convChart.update();

        // Status Update
        if (sma > upperLimit) { regimeTxt.innerText = "🚀 BULLISH"; regimeTxt.style.color = "#00e676"; }
        else if (sma < lowerLimit) { regimeTxt.innerText = "📉 BEARISH"; regimeTxt.style.color = "#ff5252"; }
        else { regimeTxt.innerText = "NEUTRAL"; regimeTxt.style.color = "#888"; }
    };
</script>
</body>
</html>
