name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true # This is the key part!

      - name: Install LFS
        run: git lfs install

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # We add 'git lfs push' before the regular push
        run: |
          git push --force https://somita:$HF_TOKEN@huggingface.co/spaces/somita/ipo-prediction-backend main
